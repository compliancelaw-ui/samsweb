<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Sam's OATH Logo - Hopeful Twilight Colors -->
  <!-- Circular badge design with OATH letters -->
  
  <!-- Outer circle - Vibrant Teal -->
  <circle cx="100" cy="100" r="95" fill="#3EABA8" />
  
  <!-- Inner circle - White -->
  <circle cx="100" cy="100" r="85" fill="#FFFFFF" />
  
  <!-- Center circle - Bright Slate Blue -->
  <circle cx="100" cy="100" r="70" fill="#4A6FA5" />
  
  <!-- OATH letters in white -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OATH</text>
  
  <!-- Small heart symbol -->
  <path d="M100 110 Q 85 95, 75 95 Q 65 95, 65 105 Q 65 115, 100 135 Q 135 115, 135 105 Q 135 95, 125 95 Q 115 95, 100 110 Z" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Tagline curve at bottom -->
  <path id="curve" d="M 30 150 Q 100 170, 170 150" fill="none" />
  <text font-family="Arial, sans-serif" font-size="10" fill="#4A6FA5" font-weight="600">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">
      What's Hidden Doesn't Heal
    </textPath>
  </text>
</svg>
